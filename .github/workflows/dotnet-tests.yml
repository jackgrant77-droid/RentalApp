  name: Run .NET Tests

  on:

    push:

      branches:

        - main

        - testing

    pull_request:

      branches:

        - main

  jobs:

    test:

      runs-on: ubuntu-latest

      steps:

        - name: Checkout repository

          uses: actions/checkout@v4

        - name: Setup .NET

          uses: actions/setup-dotnet@v4

          with:

            dotnet-version: '10.0.x'

        - name: Restore dependencies

          run: dotnet restore StarterApp.Tests/StarterApp.Tests.csproj

        - name: Run tests

          run: dotnet test StarterApp.Tests/StarterApp.Tests.csproj --no-restore
  